name: Deploy manual site

# 公開は手動実行のみ(1日の作業終了後に1回)。
# push毎の自動デプロイはGitHub Pagesの回数制限(スロットリング)に
# 引っかかるため2026-07-03に廃止。実行はActionsタブの
# "Run workflow"ボタン、またはAPIのworkflow_dispatchから。
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 連続pushでも進行中のPagesデプロイを中断せず、後続をキューで待たせる
# (cancel-in-progress: true だと同時デプロイが衝突してdeploy-pagesが失敗する)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -r requirements.txt
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
