site_name: StarNavigator 使い方マニュアル
site_description: プロ占い師向けホロスコープ作成ソフト StarNavigator（スタナビ）の使い方ガイド
# サブドメイン確定後に設定（例）:
# site_url: https://manual.starnavi.arijp.com/

# 使い方（操作方法）のみを扱う。占星術の解釈・知識（α）は載せない。

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  features:
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang:
        - ja
        - en
  - i18n:
      docs_structure: suffix
      languages:
        - locale: ja
          default: true
          name: 日本語
        - locale: en
          name: English
          nav_translations:
            ホーム: Home
            はじめに: Getting Started
            ビギナー: Beginner

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - はじめに:
      - ビギナー: beginner.md
