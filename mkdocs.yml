site_name: StarNavigator 使い方マニュアル
site_description: プロ占い師向けホロスコープ作成ソフト StarNavigator（スタナビ）の使い方ガイド
site_url: https://manual.starnavi.arijp.com/

# 使い方（操作方法）のみを扱う。占星術の解釈・知識（α）は載せない。

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  features:
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang:
        - ja
  - print-site:
      add_cover_page: true
      cover_page_template: "docs/assets/templates/print_cover.tpl"
      add_to_navigation: true
      print_page_title: "印刷 / PDF（全体）"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

extra:
  manual_date: "2026年7月版"

nav:
  - ホーム: index.md
  - ビギナー: beginner.md
  - 出生データ: birth-data.md
  - 設定: settings.md
  - チャートを開く: open-chart.md
  - 一重円: single-chart.md
  - 三重円: triple-chart.md
  - 二重円: double-chart.md
  - 未来予測: forecast.md
  - リターン図: return-chart.md
  - 年表: timeline.md
